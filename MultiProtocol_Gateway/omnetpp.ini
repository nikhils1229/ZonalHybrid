[General]
network = Testbed
sim-time-limit = 500s

# Setup CanNode to send aggressive periodic frames for visual effect
*.canNode.numSourceApps = 1
*.canNode.sourceApp[0].typename = "CanTrafficSourceAppBase"
*.canNode.sourceApp[0].idDataFrames = "26" # 0x1A - Matches Routing Table
*.canNode.sourceApp[0].periodicityDataFrames = "0.02s" # Every 20ms
*.canNode.sourceApp[0].dataLengthDataFrames = "8"
*.canNode.sourceApp[0].initialDataFrameOffset = "0s"

*.canFdNode.numSourceApps = 1
*.canFdNode.sourceApp[0].typename = "CanTrafficSourceAppBase"
*.canFdNode.sourceApp[0].idDataFrames = "50" 
*.canFdNode.sourceApp[0].periodicityDataFrames = "0.05s"
*.canFdNode.sourceApp[0].dataLengthDataFrames = "64" # Large FD Frame
*.canFdNode.sourceApp[0].initialDataFrameOffset = "0.01s"

# Setup Ethernet Node to send backbone traffic (Raw Ethernet)
*.ethNode.cli.destAddress = "02-00-00-00-00-01" # Target Gateway
*.ethNode.cli.startTime = 0.1s
*.ethNode.cli.sendInterval = uniform(0.1s, 0.3s)
*.ethNode.cli.reqLength = 1000B

# Node Setup Configurations
*.canNode.bandwidth = 500kbps
*.canFdNode.bandwidth = 2000kbps
*.canFdNode.dataBitrate = 5000kbps

*.canBus.bandwidth = 500kbps
*.canFdBus.bandwidth = 2000kbps
*.canFdBus.dataBitrate = 5000kbps

*.gateway.enableFragmentation = true
*.gateway.enableAggregation = false

# Automotive Ethernet specific MAC Configuration (100BASE-T1)
# AE requires Full Duplex and NO CSMA/CD.
*.ethSwitch.mac[*].duplexMode = true
*.ethNode.mac[*].duplexMode = true
*.ethSwitch.mac[*].bitrate = 100Mbps
*.ethNode.mac[*].bitrate = 100Mbps
# Disable CSMA/CD for AE point-to-point links
*.ethNode.mac[*].csmaCdEnabled = false
*.ethSwitch.mac[*].csmaCdEnabled = false

# Mock Configuration
*.ethSwitch.relayUnit.macTableSize = 100
*.ethNode.mac[*].address = "0A-0B-0C-0D-0E-0F"
*.ethNode.mac[*].typename = "EtherMAC" # Standard MAC for EtherHost
