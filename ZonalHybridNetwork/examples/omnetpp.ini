[General]
network = zonal_hybrid.ZonalHybridNetwork
sim-time-limit = 500s
cmdenv-express-mode = false
cmdenv-event-banners = true

# ==========================================
# ZONE 1: CAN_Std
# ==========================================
*.CAN_Std_Bus.bandwidth = 500kbps
*.CAN_Std_node.sourceApp[0].idDataFrames = "100"
*.CAN_Std_node.numSourceApps = 1
*.CAN_Std_node.sourceApp[0].typename = "CanTrafficSourceAppBase"
*.CAN_Std_node.sourceApp[0].periodicityDataFrames = "0.002"
*.CAN_Std_node.sourceApp[0].initialDataFrameOffset = "0.001"
*.CAN_Std_node.sourceApp[0].dataLengthDataFrames = "8"
*.CAN_Std_node.numSinkApps = 1
*.CAN_Std_node.sinkApp[0].typename = "CanTrafficSinkAppBase"
*.CAN_Std_node.bufferIn.idIncomingFrames = "100,110,120,400"

# ==========================================
# ZONE 2: CAN-FD
# ==========================================
*.CAN_FD_Bus_*.bandwidth = 2000kbps
*.CAN_FD_Bus_*.dataBitrate = 5000kbps
*.CAN_FD_Node_A.sourceApp[0].idDataFrames = "300"
*.CAN_FD_Node_B.sourceApp[0].idDataFrames = "200"
*.CAN_FD_Node_*.numSourceApps = 1
*.CAN_FD_Node_*.sourceApp[0].typename = "CanTrafficSourceAppBase"
*.CAN_FD_Node_*.sourceApp[0].periodicityDataFrames = "0.002"
*.CAN_FD_Node_A.sourceApp[0].initialDataFrameOffset = "0.002"
*.CAN_FD_Node_B.sourceApp[0].initialDataFrameOffset = "0.003"
*.CAN_FD_Node_*.sourceApp[0].dataLengthDataFrames = "64"
*.CAN_FD_Node_*.numSinkApps = 1
*.CAN_FD_Node_*.sinkApp[0].typename = "CanTrafficSinkAppBase"
*.CAN_FD_Node_*.bufferIn.idIncomingFrames = "200,210,220,300"

# ==========================================
# ZONE 3: Ethernet
# ==========================================
*.Ethernet_Node_*.csmacdSupport = false
*.Ethernet_Node_*.cli.destAddress = "02:00:00:00:00:01"
*.Ethernet_Node_*.cli.startTime = 0s
*.Ethernet_Node_*.cli.sendInterval = 0.002s
*.Ethernet_Node_*.cli.reqLength = 100B

# ==========================================
# ZONE 4: LIN (Expanded Slaves)
# ==========================================
*.LIN_Master.baudRate = 20kbps
*.LIN_Master.numGates = 4
*.LIN_Master.logic.numGates = 4
*.LIN_Slave_*.isMaster = false
*.LIN_Slave_*.baudRate = 20kbps
*.LIN_Slave_A.signalConfiguration = "30:0:1" 
*.LIN_Slave_B.signalConfiguration = "31:0:2" 
*.LIN_Slave_C.signalConfiguration = "32:0:3"

# ==========================================
# GATEWAYS & BACKBONE
# ==========================================
*.Gateway_*.enableAggregation = true
*.Gateway_*.enableFragmentation = true

*.Central_Switch.ethg[*].bitrate = 1Gbps
*.Ethernet_Switch_*.ethg[*].bitrate = 100Mbps
**.mac[*].duplexMode = true
**.mac[*].csmaCdEnabled = false
